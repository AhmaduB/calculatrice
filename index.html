<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>calculatrice</title>
</head>
<body>
    <div class="calculatrice">
        <div class="ecran"></div>
        <div class="touches">
            <button data-key="56" class="btn">8</button>
            <button data-key="55" class="btn">7</button>
            <button data-key="57" class="btn">9</button>
            <button data-key="8" class="btn">DEL</button>
            <button data-key="8" class="btn">AC</button>
            <button data-key="52" class="btn">4</button>
            <button data-key="53" class="btn">5</button>
            <button data-key="54" class="btn">6</button>
            <button data-key="221" class="btn">*</button>
            <button data-key="191" class="btn">/</button>   
            <button data-key="49" class="btn">1</button>
            <button data-key="50" class="btn">2</button>
            <button data-key="51" class="btn">3</button>
            <button data-key="187" class="btn">+</button>
            <button data-key="189" class="btn">-</button>
            <button data-key="48" class="btn">0</button>
            <button data-key="190" class="btn">.</button>
            <button data-key="189" class="btn">°</button>
            <button data-key="13" class="btn">=</button>
        </div>
    </div>     
    <script src="./script.js"></script>
</body>
</html>
